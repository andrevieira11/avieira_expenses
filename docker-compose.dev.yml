name: saldo-dev

# Local development Postgres only (the app runs on the host via `npm run dev`).
# Start with:  docker compose -f docker-compose.dev.yml up -d
# Then:        npm run db:migrate && npm run db:seed && npm run dev
services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-saldo}
    ports:
      - "5432:5432"
    volumes:
      - saldo_dev_pgdata:/var/lib/postgresql/data

volumes:
  saldo_dev_pgdata:
